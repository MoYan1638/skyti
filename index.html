<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyTi · 标准版</title>
  <meta name="description" content="30道题，深度分析你的光遇人格。标准版光遇人格类型测试。" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <script type="module" src="./src/main.js"></script>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div id="app">
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <div class="intro-wing">🕯️</div>
        <p class="intro-subtitle" style="font-size:0.9em;opacity:0.7;margin-bottom:4px">SBTI已经过时</p>
        <h1 class="intro-title">SkyTi来了</h1>
        <p class="intro-subtitle">光遇人格类型测试 · 27种天空灵魂 · 15维度深度解析</p>
        <button id="btn-start" class="btn btn-primary">✨ 开始测试 ✨</button>
        <p class="intro-credit">光遇主题人格测试 · 仅供娱乐</p>
        <div class="version-switcher"><a href="https://skytidemo.moyan06.icu" class="version-btn version-demo" target="_blank"><span class="version-label">15题</span><span class="version-name">Demo</span></a><a href="https://skytipro.moyan06.icu" class="version-btn version-pro" target="_blank"><span class="version-label">52题</span><span class="version-name">Pro版</span></a></div>
        <p class="intro-maker">sky墨言·出品</p>
      </div>
    </section>
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 30</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
        <button id="btn-back" class="btn btn-secondary" style="margin-top: 16px; display: none;">← 上一题</button>
      </div>
    </section>
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker">你的天空人格</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>
        <h3 class="section-title">五维评分</h3>
        <canvas id="radar-chart" width="280" height="280"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>
        <div class="result-top3">
          <h3 class="section-title">最佳匹配 TOP 3</h3>
          <div id="top-list"></div>
        </div>
        <div class="disclaimer" id="disclaimer"></div>
        <div class="result-actions">
          <button id="btn-share" class="btn btn-primary">📋 复制结果</button>
          <button id="btn-restart" class="btn btn-secondary">🔄 重新测试</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
