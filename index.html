<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyTi — 光遇人格测试</title>
  <meta name="description" content="MBTI已经过时，SkyTi来了。光遇人格类型测试，27种人格，15维度，找到你的天空灵魂。" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">

    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <div class="intro-wing">🕯️</div>
        <h1 class="intro-title">SBTI已经过时，<br/>SkyTi来了。</h1>
        <p class="intro-subtitle">光遇人格类型测试 · 27种天空灵魂 · 15维度深度解析</p>
        <button id="btn-start" class="btn btn-primary">✨ 点亮测试 ✨</button>
        <p class="intro-credit">光遇主题人格测试 · 仅供娱乐</p>
        <p class="intro-maker">sky墨言·出品</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 30</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker">你的天空人格</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">十五维度评分</h3>
        <canvas id="radar-chart" width="300" height="300"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top3">
          <h3 class="section-title">最佳匹配 TOP 5</h3>
          <div id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">📥 保存结果</button>
          <button id="btn-restart" class="btn btn-secondary">🔄 重新测试</button>
        </div>
      </div>
    </section>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
